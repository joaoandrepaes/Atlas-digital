 position: fixed; inset: 0; z-index: 0; pointer-events: none;
 background: #000;
}

 content: "";

  linear-gradient(to bottom, rgba(34,197,94,0.07) 1px, transparent 1px);

}
.particle {
 position: absolute;
 border-radius: 50%;
 background: var(--atlas-green);
 opacity: 0;
 animation: float linear infinite;
}

/* ── CARD CENTRAL ── */
.card {
 position: relative; z-index: 10;
 text-align: center;
 padding: clamp(48px, 8vw, 80px) clamp(32px, 6vw, 80px);
 max-width: 620px;
 width: 90%;
}

 font-size: clamp(96px, 18vw, 160px);
 font-weight: 900;
 line-height: 1;
 letter-spacing: -0.04em;
 color: var(--atlas-green);
 margin: 0 0 8px;
 opacity: 0;
 animation: slide-up 0.6s var(--ease-standard) 0.2s forwards;
 text-shadow: 0 0 60px rgba(34,197,94,0.35);
}

/* ── TÍTULO ── */
.title {
 font-family: var(--font-serif);
 font-size: clamp(24px, 4vw, 38px);
 font-weight: 800;
 color: #fff;
 letter-spacing: -0.025em;
 line-height: 1.15;
 margin: 0 0 16px;
 opacity: 0;
 animation: slide-up 0.6s var(--ease-standard) 0.5s forwards;
}

/* ── SUBTÍTULO ── */

 font-size: clamp(15px, 2vw, 18px);
 color: rgba(255,255,255,0.6);
 line-height: 1.65;
 margin: 0 0 40px;
 max-width: 44ch;
 margin-inline: auto;
 opacity: 0;
 animation: slide-up 0.6s var(--ease-standard) 0.7s forwards;
}

/* ── DIVISOR ── */
.divider {
 width: 48px; height: 3px;
 background: var(--atlas-green);
 border-radius: 999px;
 margin: 0 auto 36px;
 opacity: 0;
 animation: slide-up 0.4s var(--ease-standard) 0.6s forwards;
}

/* ── BOTÕES ── */
.cta-row {
 display: flex;
 flex-wrap: wrap;
 align-items: center;
 justify-content: center;
 gap: 14px;
 opacity: 0;
 animation: slide-up 0.6s var(--ease-standard) 0.9s forwards;
}

.btn-home {

 background: var(--atlas-green); color: #000;
 font-family: var(--font-sans); font-size: 16px; font-weight: 700;
 padding: 15px 30px; border-radius: 10px;
 text-decoration: none;
 transition: background 150ms, transform 80ms;
}
.btn-home:hover { background: var(--atlas-green-dark); color: #fff; }
.btn-home:active { transform: scale(0.98); }

.btn-wpp {

 padding: 14px 28px; border-radius: 10px;
 text-decoration: none;
 transition: border-color 150ms, background 150ms, transform 80ms;
}
.btn-wpp:hover {

}
.btn-wpp:active { transform: scale(0.98); }

/* ── LINK SINGELO ── */

 margin-top: 28px;

 color: rgba(255,255,255,0.3);
 letter-spacing: 0.01em;
 opacity: 0;
 animation: slide-up 0.5s var(--ease-standard) 1.1s forwards;
}

/* ── BOTÃO FLUTUANTE WPP ── */
.wpp-float {
 position: fixed; bottom: calc(28px + env(safe-area-inset-bottom, 0px)); right: 28px; z-index: 9999;
 width: 58px; height: 58px; border-radius: 50%;
 background: #22C55E; color: #fff;
 display: flex; align-items: center; justify-content: center;
 box-shadow: 0 4px 24px rgba(34,197,94,0.55);
 text-decoration: none;
 animation: flutuar 4s ease-in-out infinite;
 transition: transform 150ms, box-shadow 150ms;
}
.wpp-float:hover { transform: scale(1.1); box-shadow: 0 6px 32px rgba(34,197,94,0.7); }

/* ── KEYFRAMES ── */
@keyframes slide-up {
 from { opacity: 0; transform: translateY(20px); }
 to   { opacity: 1; transform: translateY(0); }
}
@keyframes float {
 0%   { opacity: 0; transform: translateY(0) scale(1); }
 10%  { opacity: 0.7; }
 90%  { opacity: 0.3; }
 100% { opacity: 0; transform: translateY(-100vh) scale(0.4); }
}
@keyframes flutuar {
 0%, 100% { transform: translateY(0); }
 50%       { transform: translateY(-8px); }
}
