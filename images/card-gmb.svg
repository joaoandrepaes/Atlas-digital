  <text x="386" y="155" font-family="Arial,sans-serif" font-size="11" fill="rgba(0,193,112,0.7)" text-anchor="middle">👁 2.340</text>
  <text x="386" y="169" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" text-anchor="middle">views/mês</text>
