  <rect x="348" y="126" width="80" height="22" rx="11" fill="rgba(0,193,112,0.13)"/>
  <text x="388" y="141" font-family="Arial,sans-serif" font-size="9.5" font-weight="700" fill="#00C170" text-anchor="middle">Google Maps</text>
