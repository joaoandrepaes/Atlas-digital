  <style>
:root {
  --atlas-black:      #000000;
  --atlas-white:      #FFFFFF;
  --atlas-green:      #22C55E;
  --atlas-green-dark: #15803D;
  --font-sans: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
  --font-serif: "Lora", Georgia, serif;
  --ease-standard: cubic-bezier(0.2, 0.6, 0.2, 1);
}
*, *::before, *::after { box-sizing: border-box; }
html { overflow-x: hidden; -webkit-font-smoothing: antialiased; }
body {
  overflow-x: hidden;
  font-family: var(--font-sans);
  margin: 0; padding: 0;
  background: #000;
  min-height: 100vh;
  display: grid;
  place-items: center;
  overflow: hidden;
}

/* -------- FUNDO COM PARTÍCULAS -------- */
.bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: #000;
}
.bg::before {
  content: "";
  position: absolute; inset: 0;
  background-image:
    linear-gradient(to right, rgba(34,197,94,0.07) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(34,197,94,0.07) 1px, transparent 1px);
  background-size: 40px 40px;
}
.particle {
  position: absolute;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--atlas-green);
  opacity: 0;
  animation: float linear infinite;
}

/* -------- CARD CENTRAL -------- */
.card {
  position: relative; z-index: 10;
  text-align: center;
  padding: clamp(48px, 8vw, 80px) clamp(32px, 6vw, 80px);
  max-width: 600px;
  width: 90%;
}

/* -------- ÍCONE CHECK -------- */
.check-wrap {
  display: flex; justify-content: center; margin-bottom: 36px;
}
.check-circle {
  width: 96px; height: 96px;
  border-radius: 50%;
  border: 3px solid var(--atlas-green);
  display: flex; align-items: center; justify-content: center;
  position: relative;
  animation: pop 0.5s var(--ease-standard) 0.3s both;
}
.check-circle::before {
  content: "";
  position: absolute; inset: 0; border-radius: 50%;
  background: rgba(34,197,94, 0.1);
  animation: pulse-ring 2s ease-out 0.8s infinite;
}
.check-icon {
  width: 42px; height: 42px;
  stroke: var(--atlas-green); stroke-width: 3;
  stroke-linecap: round; stroke-linejoin: round;
  fill: none;
  stroke-dasharray: 60;
  stroke-dashoffset: 60;
  animation: draw-check 0.5s var(--ease-standard) 0.7s forwards;
}

/* -------- TEXTO -------- */
.title {
  font-family: var(--font-serif);
  font-size: clamp(36px, 5vw, 56px);
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.025em;
  line-height: 1.05;
  margin: 0 0 20px;
  opacity: 0;
  animation: slide-up 0.6s var(--ease-standard) 0.9s forwards;
}
.title .accent { color: var(--atlas-green); }

.subtitle {
  font-size: clamp(16px, 2vw, 20px);
  color: rgba(255,255,255,0.75);
  line-height: 1.6;
  margin: 0 0 40px;
  max-width: 42ch;
  margin-inline: auto;
  opacity: 0;
  animation: slide-up 0.6s var(--ease-standard) 1.1s forwards;
}

/* -------- BADGE PRAZO -------- */
.badge {
  display: inline-flex; align-items: center; gap: 10px;
  background: rgba(34,197,94,0.12);
  border: 1px solid rgba(34,197,94,0.3);
  border-radius: 999px;
  padding: 10px 22px;
  margin-bottom: 40px;
  opacity: 0;
  animation: slide-up 0.6s var(--ease-standard) 1.2s forwards;
}
.badge__dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--atlas-green);
  animation: blink-dot 1.5s ease-in-out infinite;
}
.badge__text {
  font-size: 14px; font-weight: 600; color: var(--atlas-green);
  letter-spacing: 0.02em;
}

/* -------- CTA WHATSAPP -------- */
.cta-row {
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  opacity: 0;
  animation: slide-up 0.6s var(--ease-standard) 1.4s forwards;
}
.btn-wpp {
  display: inline-flex; align-items: center; gap: 10px;
  background: #22C55E; color: #000;
  font-family: var(--font-sans); font-size: 16px; font-weight: 700;
  padding: 16px 32px; border-radius: 10px;
  text-decoration: none; border: 0; cursor: pointer;
  transition: background 150ms, transform 80ms;
}
.btn-wpp:hover { background: #15803D; color: #fff; }
.btn-wpp:active { transform: scale(0.98); }
.btn-wpp svg { flex-shrink: 0; }

.link-back {
  font-size: 14px; color: rgba(255,255,255,0.45);
  text-decoration: none;
  transition: color 150ms;
}
.link-back:hover { color: rgba(255,255,255,0.8); }

/* -------- KEYFRAMES -------- */
@keyframes pop {
  from { transform: scale(0.5); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}
@keyframes pulse-ring {
  0%   { transform: scale(1);   opacity: 0.6; }
  100% { transform: scale(1.8); opacity: 0; }
}
@keyframes draw-check {
  to { stroke-dashoffset: 0; }
}
@keyframes slide-up {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes blink-dot {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.3; }
}
@keyframes float {
  0%   { opacity: 0; transform: translateY(0) scale(1); }
  10%  { opacity: 0.8; }
  90%  { opacity: 0.4; }
  100% { opacity: 0; transform: translateY(-100vh) scale(0.5); }
}
  
/* -------- BOTÃO FLUTUANTE WHATSAPP -------- */
.wpp-float {
  position: fixed; bottom: calc(28px + env(safe-area-inset-bottom, 0px)); right: 28px; z-index: 9999;
  width: 60px; height: 60px; border-radius: 50%;
  background: #22C55E; color: #fff;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 24px rgba(34,197,94,0.55);
  animation: flutuar 4s ease-in-out infinite;
  transition: transform 150ms, box-shadow 150ms;
  text-decoration: none;
}
.wpp-float:hover { transform: scale(1.1); box-shadow: 0 6px 32px rgba(34,197,94,0.7); }
.wpp-float svg { pointer-events: none; }
